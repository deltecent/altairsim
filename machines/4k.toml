# The Altair as it actually left Albuquerque.
#
# A 1975 Altair 8800 shipped with 256 BYTES on the CPU card. The first thing
# anybody bought was memory, and the machine that made the Altair famous -- the
# one Altair 4K BASIC was written for, and the one Gates and Allen sold to MITS
# -- is this one: 4K of RAM at 0000-0FFF and nothing else in the backplane.
#
# It is here as the small end of the range. If a bug only shows up when almost
# nothing is populated -- an unowned page floating to FF, a region map that
# assumed 64K -- this machine finds it and `default` does not.
#
# NO ROM, and that is the whole point of this machine. A bare Altair had none: you
# entered the bootstrap on the FRONT PANEL, in binary, with your fingers, and if
# you got it wrong you did it again. The DBL boot PROM came with the disk system,
# which is why it lives in `default` and not here.
#
# So DEPOSIT is not a debugging convenience on this machine -- it IS the loader,
# and it is doing exactly what the toggle switches did.

[machine]
name  = "4k"

# THE FRONT PANEL, and on this machine of all machines it is not decoration. This is
# the Altair with no ROM in it -- the one whose header, six lines up, says you
# entered the bootstrap with your fingers. The panel is the only input device it has.
#
# (The switches the monitor's DEPOSIT and EXAMINE stand in for are SA0..SA15 on this
# very card. It is the SENSE half, SA8..SA15, that the guest can read, at port FF --
# and Altair 4K BASIC is the software that reads them: its loader asks the switches
# what terminal it is talking to. See docs/boards/mits-frontpanel.md.)
[[board]]
type  = "fp"
id    = "fp0"
sense = 0x00

# An 88-CPU, because of course there was one: a 4K Altair was a complete computer,
# not a memory bench. (The bench with no processor in it is `altairsim -n`, and it
# is a real machine too -- the monitor is the bus master.)
[[board]]
type     = "8080"
id       = "cpu0"
clock_hz = 0        # flat out (the default). `SET cpu0 clock_hz=2000000` for the real 2 MHz.

[[board]]
type = "memory"
id   = "mem0"

  [[board.region]]
  type = "ram"
  at   = 0000
  size = "4K"
