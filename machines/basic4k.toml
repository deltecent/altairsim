# The machine Altair 4K BASIC was sold to run on: a cassette in the ACR, a Teletype
# on the SIO.
#
# This is `4k` -- the bare 1975 machine -- with the two I/O cards that made it useful,
# and it exists to run ONE artifact end to end: `tapes/4K BASIC Ver 3-1.tap`, loaded by
# the period bootstrap in `tapes/LDR4K31.ASM`, unmodified, off a real cassette image.
# That is the 88-ACR's acceptance test, and it is the reason this file is here rather
# than a paragraph of MOUNT commands in a doc nobody runs.
#
#   altairsim basic4k
#   MOUNT acr0:tape "tapes/4K BASIC Ver 3-1.tap"
#   LOAD  "tapes/LDR4K31.HEX"
#   RUN 0
#   -> MEMORY SIZE?
#
# The tape is NOT in this file, deliberately. A machine file describes the HARDWARE;
# which cassette is in the recorder is not hardware, and there is no motor control on
# the card to make it one. You put the tape in and you press PLAY -- which is what
# MOUNT is (docs/boards/mits-88acr.md).

[machine]
name = "basic4k"

# SENSE = 0x80, and this is the one number in the file you cannot guess.
#
# The sense switches are SA8..SA15, read at port FF (docs/boards/mits-frontpanel.md).
# 0x80 is SA15 alone -- A15 UP -- and the bootstrap's own header says what that means:
#
#     ** Set A15 on (cassette load) **
#     ** All other switches off **
#
# A15 up is "load from the cassette"; all-off is "the console is the SIO at 0". Get this
# wrong and BASIC loads from the wrong device, or comes up talking to nothing.
[[board]]
type  = "fp"
id    = "fp0"
sense = 0x80

[[board]]
type     = "8080"
id       = "cpu0"
clock_hz = 2000000

# THE CONSOLE -- an 88-SIO at port 0, because that is where 4K BASIC 3.1 looks for it.
# Not the 2SIO at 0x10 that `default` has: this BASIC predates that card.
#
# strip7out, AND NOT data_bits = 7. This is the one setting here that is a JUDGEMENT, so
# here is the whole of it.
#
# MITS BASIC ends a message by setting bit 7 of its LAST character: "MEMORY SIZE?" leaves
# the interpreter as ...'S','I','Z','E'|0x80. It is a string TERMINATOR, not data. Send
# all eight bits to a modern terminal and every prompt in the machine ends in a garbage
# character -- `MEMORY SIZ?`.
#
# The tempting fix is to strap the card for 7 data bits, and `Basic Versions.pdf` even
# says "7 bit serial comm" against these builds. It is the wrong fix, because a 7-bit
# strap would mask the data in the UART itself -- and THE PORT IS NOT BASIC'S. It is a
# general-purpose serial port, and the next thing through it is XMODEM, which is 8-bit
# binary. A card that quietly drops bit 7 of every byte corrupts that transfer, and it
# corrupts it silently.
#
# The real machine did not strip anything. The card sent all eight bits and the TELETYPE
# ignored the eighth -- on a Model 33 that is the parity position, and the printer never
# decodes it. So the ignoring belongs to the TERMINAL, which is what `strip7out` is: a
# property of the line's endpoint (DESIGN.md 7.2), not of the chip. The port stays
# 8-bit-clean for everything that is not a Teletype.
#
# stop_bits = 2 is the card as a previous owner actually built it: the ticked boxes on the
# scan in the 88-SIO manual are 7 data bits and 2 stop bits (docs/boards/mits-88sio.md).
# We keep his stop bits -- they only time the character -- and decline his word length.
[[board]]
type      = "sio"
id        = "sio0"
port      = 00
stop_bits = 2
strip7out = true
connect   = "console"

# THE CASSETTE -- an 88-ACR at 006, which is not a choice: the manual says "wire address
# select for 006", and the bootstrap agrees (IN 06 / IN 07). It does not collide with the
# console at 0, and that is the whole reason the console can BE at 0.
[[board]]
type = "acr"
id   = "acr0"
port = 06

[[board]]
type = "memory"
id   = "mem0"

  [[board.region]]
  type = "ram"
  at   = 0000
  size = "4K"
