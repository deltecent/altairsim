# The machine Altair 4K BASIC was sold to run on: a cassette in the ACR, a Teletype
# on the SIO.
#
# This is `4k` -- the bare 1975 machine -- with the two I/O cards that made it useful,
# and it exists to run ONE artifact end to end: `examples/basic/4K BASIC Ver 3-1.tap`, loaded
# by the period bootstrap MITS shipped (assembled in `tapes/4KBasic31/LDR4K31.ASM`, and in
# `examples/basic/LDR4K31.HEX` beside the tape), unmodified, off a real cassette image.
# That is the 88-ACR's acceptance test, and it is the reason this file is here rather
# than a paragraph of MOUNT commands in a doc nobody runs.
#
#   altairsim basic4k
#   MOUNT acr0:tape "examples/basic/4K BASIC Ver 3-1.tap"
#   LOAD  "examples/basic/LDR4K31.HEX"
#   RUN 0
#   -> MEMORY SIZE?
#
# The tape is NOT in this file, deliberately. A machine file describes the HARDWARE;
# which cassette is in the recorder is not hardware, and there is no motor control on
# the card to make it one. You put the tape in and you press PLAY -- which is what
# MOUNT is (docs/boards/mits-88acr.md).

[machine]
name = "basic4k"

# SENSE = 0x80, and this is the one number in the file you cannot guess.
#
# The sense switches are SA8..SA15, read at port FF (docs/boards/mits-frontpanel.md).
# 0x80 is SA15 alone -- A15 UP -- and the bootstrap's own header says what that means:
#
#     ** Set A15 on (cassette load) **
#     ** All other switches off **
#
# A15 up is "load from the cassette"; all-off is "the console is the SIO at 0". Get this
# wrong and BASIC loads from the wrong device, or comes up talking to nothing.
[[board]]
type  = "fp"
id    = "fp0"
sense = 0x80

[[board]]
type     = "8080"
id       = "cpu0"
clock_hz = 0        # flat out (the default). `SET cpu0 clock_hz=2000000` for the real 2 MHz.

# THE CONSOLE -- an 88-SIO at port 0, because that is where 4K BASIC 3.1 looks for it.
# Not the 2SIO at 0x10 that `default` has: this BASIC predates that card.
#
# stop_bits = 2 is the card as a previous owner actually built it: the ticked boxes on
# the scan in the 88-SIO manual are 7 data bits and 2 stop bits (docs/boards/mits-88sio.md).
# We keep his stop bits. We DECLINE his word length, and the reason is below.
#
# NOTE WHAT IS NOT HERE: nothing on this card rewrites a byte. The line is 8-bit clean.
# See [console] at the bottom of the file -- that is where BASIC's high bit is dealt
# with, because that is where the Teletype is.
[[board]]
type      = "sio"
id        = "sio0"
port      = 00
stop_bits = 2
connect   = "console"

# THE CASSETTE -- an 88-ACR at 006, which is not a choice: the manual says "wire address
# select for 006", and the bootstrap agrees (IN 06 / IN 07). It does not collide with the
# console at 0, and that is the whole reason the console can BE at 0.
[[board]]
type = "acr"
id   = "acr0"
port = 06

[[board]]
type = "memory"
id   = "mem0"

  [[board.region]]
  type = "ram"
  at   = 0000
  size = "4K"

# THE TERMINAL -- and this is the one setting in the file that is a JUDGEMENT, so here
# is the whole of it.
#
# MITS BASIC ends a message by setting bit 7 of its LAST character: "MEMORY SIZE?" leaves
# the interpreter as ...'S','I','Z','E'|0x80. It is a string TERMINATOR, not data. Send
# all eight bits to a modern terminal and every prompt in the machine ends in a garbage
# character -- `MEMORY SIZ?`.
#
# There are two wrong places to fix that and one right one.
#
#   NOT `data_bits = 7` on the card. `Basic Versions.pdf` says "7 bit serial comm"
#   against these builds and the scanned card has the 7-bit boxes ticked, so it is very
#   tempting. But a 7-bit strap is a FRAME: it means the eighth bit does not travel at
#   all, for anybody. The port is not BASIC's -- it is a general-purpose serial port, and
#   the next thing through it may be XMODEM, which is 8-bit binary.
#
#   NOT a transform on the LINE. Same objection, arrived at from the other side: a knob
#   on sio0 that masks bit 7 corrupts that XMODEM transfer just as thoroughly, and it
#   does it silently. There is no such knob any more, on this card or any other.
#
#   The TERMINAL. The real machine stripped nothing: the card sent all eight bits and the
#   TELETYPE ignored the eighth -- on a Model 33 that is the parity position, and the
#   printing mechanism never decodes it. Nothing was masked; something on the far end
#   simply did not look. That is what `strip7out` on the console is, and it is the only
#   thing in the simulator allowed to alter a byte (DESIGN.md 7.2).
#
# The line stays 8-bit clean. The Teletype ignores the eighth bit. Both true, as they
# were in 1975.
[console]
strip7out = true
