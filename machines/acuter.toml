# ACUTER at F000 -- CUTER on a plain Altair, with a terminal instead of a VDM.
#
#     altairsim acuter
#     >DU F000 F00F
#     F000  7F C3 81 F0 C3 C3 F0 C3 52 F4 C3 75 F4 C3 B8 F4
#
# THE OTHER CUTER. `cuter` in this binary is Processor Technology's own CUTER 1.3
# painting its prompt into a VDM-1's screen memory, which is the Sol-20 arrangement.
# This is Mike Douglas's 1.0 port of the same monitor to an ordinary Altair: same
# command set, same CUTS cassette format, but the console is a serial terminal and
# there is nothing memory-mapped about it. It adds `HGET` and `HSAVE` for Intel HEX
# over a chosen pseudo-port, which the Processor Technology original had no use for.
#
# Commands abort with CTRL-@, as in CUTER -- not Control-C.
#
# Every address and port below comes out of roms/ACUTER/ACUTER.ASM, and nothing in
# this file is a preference.

[machine]
name    = "acuter"
startup = ["RUN F000"]        # cold start is the base of the ROM (ACUTER.ASM: INIT)

[[board]]
type  = "fp"
id    = "fp0"
sense = 0x00

[[board]]
type     = "8080"
id       = "cpu0"
clock_hz = 0                  # flat out (the default)

# THE CONSOLE AND THE SECOND LINE ARE ONE CARD. CUTER numbers its pseudo-devices, and
# the first two of them are the two halves of this 88-2SIO: pseudo-port 0 (console) is
# 10h/11h and pseudo-port 1 (serial) is 12h/13h (ACUTER.ASM: SIO1CSR/SIO2CSR). So `B`
# is not decoration here -- it is a device ACUTER can be told to talk over, and it is
# left unconnected because there is nothing on the far end until you connect one.
#
# Pseudo-port 2 is an 88-PIO at 04/05, and there is no PIO board in this simulator, so
# that one device is missing. It floats to FF, "not ready", and CUTER waits on it
# rather than misbehaving -- which is what an Altair with no PIO in it does.
[[board]]
type = "2sio"
id   = "sio0"
port = 10

  [board.unit.a]
  connect = "console"
  baud    = 9600

  [board.unit.b]
  connect = "null"
  baud    = 9600

# THE CASSETTE, and CUTER is a cassette operating system -- SAVE, GET, CATalog and
# EXECute all go through it, so a machine without one has had the point removed. The
# 88-ACR at 06/07 is what the port reads (ACUTER.ASM: TAPPT/TDATA).
#
# Nothing is in the drive:
#
#     MOUNT acr0:tape mytape.tap
[[board]]
type = "acr"
id   = "acr0"
port = 06

[[board]]
type = "memory"
id   = "mem0"
fill = "random"

  # 56K, and the top of it is not free: ACUTER puts its own 1K system area at BC00
  # (ACUTER.ASM: RAMADDR equ 0BC00H) with the stack working down from BFFF. So this
  # region has to cover BC00-BFFF, and a machine with less than 48K of RAM has nowhere
  # for the monitor to keep its variables.
  [[board.region]]
  type = "ram"
  at   = 0000
  size = "56K"                # 0000-DFFF

  # 2 KB, and only 2 KB -- ACUTER is a 2732-sized image at F000-F7FF. F800 upward is
  # empty in this machine, which is where a boot PROM would go.
  [[board.region]]
  type  = "rom"
  at    = F000
  mount = "builtin:acuter"
