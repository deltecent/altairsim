# The machine you get when you name none: 56K, and the DBL boot PROM at FF00.
#
# This is the CP/M-era Altair, not a stock 1975 one. A bare Altair 8800 had NO
# ROM -- you toggled the bootstrap in from the front panel -- and that machine is
# here too, as `4k`. It carries the period-accuracy job, which frees this one to
# carry a different one: being the machine you actually want when you type
# `altairsim` and nothing else. On a real disk Altair the boot PROM was there,
# and a default with an empty FF00 is a machine you have to repair before it is
# any use, which is the opposite of what a default is for.
#
# 56K of RAM, 0000-DFFF. RAM stops at E000 to leave the top 8K for the PROM and
# the memory-mapped I/O a real machine put up there. It is not 64K and it never
# was -- the "56K" in CP/M's own sign-on banner is this number.
#
# NOTHING IS SHADOWED HERE, AND DBL DOES NOT NEED IT TO BE.
#
# An earlier machine file said the PROM "shadows the top page" and set
# honors_phantom to make a point of it. That was fiction, and it is worth spelling
# out because it is the exact failure DESIGN.md 0.1 exists to prevent: a plausible
# story about hardware, believed because it sounded like how things ought to work.
#
# The truth is in the PROM itself. DBL's first three instructions are
#
#     FF00  21 13 FF     LXI  H,FF13     ; source: myself, from FF13
#     FF03  11 00 2C     LXI  D,2C00     ; destination: RAM at 2C00
#     FF06  0E EB        MVI  C,0EBH     ; 235 bytes
#
# -- it copies itself into RAM and runs there, because the EPROM was too slow to
# execute from. It never writes to FFxx at all. So no write needs to fall through
# to RAM underneath, hence no reason for the PROM to pull PHANTOM*, and there is
# not even any RAM up there to shadow: 56K stops at DFFF. (The board can still
# assert PHANTOM* -- see docs/boards/s100-memory.md. It is a real S-100 signal and
# other cards need it. This one does not, and saying so is cheaper than a week
# spent debugging a machine that was never wrong.)
#
# THE 8080 IS HERE NOW, and it arrived exactly as predicted: as one more [[board]]
# in this file, with nothing else about the machine moving. `RUN FF00` runs the
# boot PROM, and it really does copy itself to 2C00 and jump there.
#
# THE 2SIO IS HERE NOW TOO, so the console CP/M will print its banner on is in the
# backplane and connected.
#
# AND SO IS THE 88-DCDD. The claim this file made three cards ago -- "when the disk
# lands, THIS FILE GROWS ONE MORE [[board]] and nothing else about it changes" -- has
# now held four times. The controller is in the machine with NO DISK IN IT, which is
# the honest default: an Altair shipped with a drive cable, not with your floppy.
#
# So `altairsim` + `RUN FF00` still does not reach CP/M, and it is no longer lying
# about why. DBL relocates itself, selects drive 0, finds no disk, and spins. Put one
# in and it boots:
#
#     altairsim
#     MOUNT dsk0:drive0 "disks/mits-88dcdd/cpm22/buffered/cpm22b23-56k.dsk"
#     RUN FF00
#     -> 56K CP/M 2.2b v2.3
#
# ...which is precisely what `base = "default"` exists to write down. The two CP/M
# machine files next to those disk images are this machine plus one mounted drive, and
# they say so in three lines (docs/config.md).
#
# THIS IS THE MACHINE A DELTA STARTS FROM, so what is in it is now a decision that
# other files depend on: a front panel, an 8080, a 2SIO, an 88-DCDD, 56K, and DBL.
#
# The historical note, kept because it explains the shape of the file: before the
# controller existed, DBL polled ports that no card decoded, and every IN read a floating
# FF because nobody was driving them. You could watch it with BREAK IO R 08. That was not
# a bug -- it is what an Altair with no disk controller in it does -- and the difference
# now is that the card answers, and says there is no disk.
#
# `altairsim altmon` is still the machine you can talk to with nothing mounted at all.

[machine]
name     = "default"

# THE FRONT PANEL IS A CARD, and the SENSE switches are on it -- SA8..SA15, the top
# eight of the sixteen address switches, strobed onto D0..D7 when the guest does an
# IN from port FF (schematic 880-106; Theory of Operation, "the sense switches
# (device address 377o)"). They used to be a `[machine] sense` byte that nothing put
# on the bus at all, so `IN 0FFH` read the floating bus -- 0xFF -- and DBL's bit-4
# test was reading a wire instead of a switch.
#
# ALL EIGHT DOWN, and that is a REAL SETTING with a real consequence -- not a
# placeholder. DBL tests bit 4, which is switch SA12, and its own source says what
# that means (roms/DBL/DBL.ASM:166):
#
#     ;IF SWITCH A12 IS UP, IT'S ONE STOP BIT. OTHERWISE. IT'S 2 STOP BITS.
#
# So with SA12 down, DBL writes 0x10 to the 2SIO's control register: 8 data bits, no
# parity, TWO stop bits. With it up it writes 0x14 -- 8N1. Both boot. The difference
# is the length of a character on the wire (11 bit-times vs 10), which the 6850 model
# uses to pace the line.
#
# Worth knowing: until the panel existed, `IN 0FFH` read the FLOATING BUS and got
# 0xFF -- every switch "up" -- so this machine has been quietly running 8N1 all
# along, and it was luck. If you want that back, set sense = 0x10 and mean it.
[[board]]
type  = "fp"
id    = "fp0"
sense = 0x00

# THE CPU IS A CARD, because in a real Altair it was one -- the MITS 88-CPU -- and
# people pulled it out and put a Z80 in its place. So it has properties, both
# resets, and a line in BOARDS, with no special cases anywhere.
#
# It decodes NOTHING. It is not being coy: a plain 88-CPU has nothing on it that a
# bus cycle can reach. It ORIGINATES cycles instead, which is what a bus master is,
# and it is the same interface a DMA card will use to steal the bus later.
[[board]]
type     = "8080"
id       = "cpu0"
clock_hz = 0                  # FLAT OUT, and that is the default. The crystal is ON
                              # THIS CARD, which is why the clock is the board's
                              # property and not the machine's -- and `clock_hz =
                              # 2000000` gives you the real 88-CPU's 2 MHz back, with
                              # the real waiting that goes with it. Emulated time is
                              # identical either way; only the sleeping differs.
                              #
                              # FLAT OUT STILL STANDS DOWN AT A PROMPT: `idle` is on by
                              # default, and it is a SEPARATE policy from the crystal.
                              # A guest waiting for a key polls an empty UART and does
                              # nothing else, and running that as fast as the host can
                              # go cost an entire core -- CP/M at `A0>` pinned a CPU.
                              # Now it costs ~3%, and no guest can tell the difference:
                              # only the HOST sleeps. `SET cpu0 idle=off` for the spin.

# The console. CP/M's BIOS talks to a 2SIO at port 10, and so does DBL: it reads
# the sense switches at FF22 to decide the 2SIO's stop bits, which is why `sense`
# above is not decorative.
#
# Channel B is left unconnected on purpose. That is not a gap -- an unconnected
# 6850 sits there with TDRE set forever, and software that writes to it works fine
# and talks to nobody, exactly as the card does with nothing in the second socket.
[[board]]
type = "2sio"
id   = "sio0"
port = 10

  [board.unit.a]
  connect = "console"
  baud    = 9600

  [board.unit.b]
  connect = "null"
  baud    = 9600

# THE FLOPPY CONTROLLER -- an 88-DCDD at 0x08, which is not a choice: the boot PROM
# above is hard-wired to it (DBL selects drive 0 at port 08 and shifts the first sector
# in through 0A), and so is every Altair CP/M BIOS ever written.
#
# FOUR DRIVES, AND NO DISKS IN THEM. That is what an Altair shipped as -- the controller
# and the cable were the product; the floppy was yours -- and it is the honest default
# for the same reason `fill = "random"` is: an empty drive is a real state, and it is the
# state this machine is in until you put something in it.
#
#     MOUNT dsk0:drive0 "disks/mits-88dcdd/cpm22/buffered/cpm22b23-56k.dsk"
#     RUN FF00
#
# The card PROBES what you mount -- 337,568 bytes (or the XMODEM-padded 337,664 that
# every real image turns out to be) is an 8" floppy, 76,720 is a minidisk, and 8,978,432
# is an 8 MB image. Geometry belongs to the BOARD (DESIGN.md 7.3), so nothing here has to
# say which.
#
# THE 8 MB DISK IS NOT A DIFFERENT CARD. It is the same 137-byte hard-sector format, 32
# sectors to a track, with 2048 tracks -- more than would fit on a physical platter, but
# the controller only steps the head and shifts bytes and cannot tell. (It comes from the
# FDC+, a modern card that emulates this one and whose serial disk server serves images
# that big.) So it is one more row in the format table, not a mode.
[[board]]
type   = "dcdd"
id     = "dsk0"
port   = 08
drives = 4

# THE HOST BRIDGE -- and it is the one card in this machine that MITS never made.
#
# It exists because there is otherwise no way to get a file into or out of a running
# CP/M guest. Host-side surgery on a mounted image is DEFERRED and will stay that way
# for a while (DESIGN.md 12.2: reading a file out of an image needs the controller's
# sector layout AND the image's own CP/M DPB and skew, and nothing can infer that
# pair). So this is not a convenience card -- it is THE supported path, which is why
# it is in the default machine rather than off in an example.
#
#     R  FOO.ASM        host -> CP/M
#     W  FOO.ASM        CP/M -> host
#     HDIR              what is on the host
#
# ...typed at the A> prompt, from cpm/hostbridge/*.ASM. They are ours, they are 8080,
# and they do every file operation through BDOS -- so they work on this 8" controller,
# on the minidisk, and on any BIOS anybody writes later.
#
# `hostdir` IS EMPTY, WHICH MEANS THE DIRECTORY YOU RAN altairsim FROM. That is the
# same rule every typed path already follows (core/paths.h), and it is what makes
# `R FOO.ASM` work on the file you are looking at without configuring anything.
#
# IT ALSO MEANS GUEST SOFTWARE CAN READ AND WRITE YOUR WORKING DIRECTORY, and that is
# a deliberate trade, not an oversight. It CANNOT go anywhere else. A name may be a
# relative path -- `R SRC/FOO.ASM` works, and both `/` and `\` are accepted on every
# host, so one assembled R.COM runs against a Mac, a Linux box and a Windows box -- but
# a `..` COMPONENT, an absolute path, a drive letter and a symlink that resolves out of
# the root are all refused with error 0x03. The escape check is a component-wise compare
# against the canonicalised root, not a string prefix, because a string prefix would
# cheerfully decide that /tmp/sandbox-evil lives inside /tmp/sandbox. (src/host/hostdir.h;
# tests/test_hostdir.cpp is where that claim is proved, against a REAL filesystem with
# REAL symlinks -- an escape you cannot test against a fake one.) If you want it aimed
# somewhere specific:
#
#     altairsim -x 'SET hb0 HOSTDIR=/tmp/xfer' -i
#
# ...and `SET hb0 READONLY=ON` makes it a one-way street, out of the host only.
#
# PORT B0, AND THAT NUMBER TOOK A CENSUS. 0x30 was the obvious pick and it is WRONG:
# the WD179X floppy controller defaults there and the Cromemco 64FDC sits on top of it.
# B0-BF and D0-DF are the only 16-port holes left in the S-100 catalog.
[[board]]
type    = "hostbridge"
id      = "hb0"
port    = B0
hostdir = ""                  # the shell's working directory

[[board]]
type = "memory"
id   = "mem0"
fill = "random"               # real static RAM does not come up zeroed

  [[board.region]]
  type = "ram"
  at   = 0000
  size = "56K"                # 0000-DFFF

  [[board.region]]
  type  = "rom"
  at    = FF00
  mount = "builtin:dbl"       # compiled in: nothing to download, same on every OS
