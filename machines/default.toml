# The machine you get when you name none: 56K, and the DBL boot PROM at FF00.
#
# This is the CP/M-era Altair, not a stock 1975 one. A bare Altair 8800 had NO
# ROM -- you toggled the bootstrap in from the front panel -- and that machine is
# here too, as `4k`. It carries the period-accuracy job, which frees this one to
# carry a different one: being the machine you actually want when you type
# `altairsim` and nothing else. On a real disk Altair the boot PROM was there,
# and a default with an empty FF00 is a machine you have to repair before it is
# any use, which is the opposite of what a default is for.
#
# 56K of RAM, 0000-DFFF. RAM stops at E000 to leave the top 8K for the PROM and
# the memory-mapped I/O a real machine put up there. It is not 64K and it never
# was -- the "56K" in CP/M's own sign-on banner is this number.
#
# NOTHING IS SHADOWED HERE, AND DBL DOES NOT NEED IT TO BE.
#
# An earlier machine file said the PROM "shadows the top page" and set
# honors_phantom to make a point of it. That was fiction, and it is worth spelling
# out because it is the exact failure DESIGN.md 0.1 exists to prevent: a plausible
# story about hardware, believed because it sounded like how things ought to work.
#
# The truth is in the PROM itself. DBL's first three instructions are
#
#     FF00  21 13 FF     LXI  H,FF13     ; source: myself, from FF13
#     FF03  11 00 2C     LXI  D,2C00     ; destination: RAM at 2C00
#     FF06  0E EB        MVI  C,0EBH     ; 235 bytes
#
# -- it copies itself into RAM and runs there, because the EPROM was too slow to
# execute from. It never writes to FFxx at all. So no write needs to fall through
# to RAM underneath, hence no reason for the PROM to pull PHANTOM*, and there is
# not even any RAM up there to shadow: 56K stops at DFFF. (The board can still
# assert PHANTOM* -- see docs/boards/s100-memory.md. It is a real S-100 signal and
# other cards need it. This one does not, and saying so is cheaper than a week
# spent debugging a machine that was never wrong.)
#
# THE 8080 IS HERE NOW, and it arrived exactly as predicted: as one more [[board]]
# in this file, with nothing else about the machine moving. `RUN FF00` runs the
# boot PROM, and it really does copy itself to 2C00 and jump there.
#
# THE 2SIO IS HERE NOW TOO, so the console CP/M will print its banner on is in the
# backplane and connected.
#
# It still cannot finish booting, and that is honest: there is no 88-DCDD for it to
# read a disk from. DBL relocates itself, starts polling a disk controller that is
# not in the backplane, and spins. Every IN it does reads a floating FF, because
# nobody is driving those ports. That is not a bug -- it is what an Altair with no
# disk controller in it does, and you can watch it happen with BREAK IO R 08.
#
# The disk is milestone 3. When it lands, THIS FILE GROWS ONE MORE [[board]] and
# nothing else about it changes -- which is the claim the whole design is making,
# and the 8080 and the 2SIO have both now arrived exactly that way.
#
# In the meantime, `altairsim altmon` is a machine you can actually talk to today.

[machine]
name     = "default"

# THE FRONT PANEL IS A CARD, and the SENSE switches are on it -- SA8..SA15, the top
# eight of the sixteen address switches, strobed onto D0..D7 when the guest does an
# IN from port FF (schematic 880-106; Theory of Operation, "the sense switches
# (device address 377o)"). They used to be a `[machine] sense` byte that nothing put
# on the bus at all, so `IN 0FFH` read the floating bus -- 0xFF -- and DBL's bit-4
# test was reading a wire instead of a switch.
#
# ALL EIGHT DOWN, and that is a REAL SETTING with a real consequence -- not a
# placeholder. DBL tests bit 4, which is switch SA12, and its own source says what
# that means (roms/DBL/DBL.ASM:166):
#
#     ;IF SWITCH A12 IS UP, IT'S ONE STOP BIT. OTHERWISE. IT'S 2 STOP BITS.
#
# So with SA12 down, DBL writes 0x10 to the 2SIO's control register: 8 data bits, no
# parity, TWO stop bits. With it up it writes 0x14 -- 8N1. Both boot. The difference
# is the length of a character on the wire (11 bit-times vs 10), which the 6850 model
# uses to pace the line.
#
# Worth knowing: until the panel existed, `IN 0FFH` read the FLOATING BUS and got
# 0xFF -- every switch "up" -- so this machine has been quietly running 8N1 all
# along, and it was luck. If you want that back, set sense = 0x10 and mean it.
[[board]]
type  = "fp"
id    = "fp0"
sense = 0x00

# THE CPU IS A CARD, because in a real Altair it was one -- the MITS 88-CPU -- and
# people pulled it out and put a Z80 in its place. So it has properties, both
# resets, and a line in BOARDS, with no special cases anywhere.
#
# It decodes NOTHING. It is not being coy: a plain 88-CPU has nothing on it that a
# bus cycle can reach. It ORIGINATES cycles instead, which is what a bus master is,
# and it is the same interface a DMA card will use to steal the bus later.
[[board]]
type     = "8080"
id       = "cpu0"
clock_hz = 0                  # FLAT OUT, and that is the default. The crystal is ON
                              # THIS CARD, which is why the clock is the board's
                              # property and not the machine's -- and `clock_hz =
                              # 2000000` gives you the real 88-CPU's 2 MHz back, with
                              # the real waiting that goes with it. Emulated time is
                              # identical either way; only the sleeping differs.

# The console. CP/M's BIOS talks to a 2SIO at port 10, and so does DBL: it reads
# the sense switches at FF22 to decide the 2SIO's stop bits, which is why `sense`
# above is not decorative.
#
# Channel B is left unconnected on purpose. That is not a gap -- an unconnected
# 6850 sits there with TDRE set forever, and software that writes to it works fine
# and talks to nobody, exactly as the card does with nothing in the second socket.
[[board]]
type = "2sio"
id   = "sio0"
port = 10

  [board.unit.a]
  connect = "console"
  baud    = 9600

  [board.unit.b]
  connect = "null"
  baud    = 9600

[[board]]
type = "memory"
id   = "mem0"
fill = "random"               # real static RAM does not come up zeroed

  [[board.region]]
  type = "ram"
  at   = 0000
  size = "56K"                # 0000-DFFF

  [[board.region]]
  type  = "rom"
  at    = FF00
  mount = "builtin:dbl"       # compiled in: nothing to download, same on every OS
