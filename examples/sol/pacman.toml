# PAC-MAN on a Processor Technology Sol-20 -- boots SOLOS, loads the game off the cassette,
# and starts it. Just:
#
#     cd examples/sol && altairsim pacman.toml
#
# and PAC-MAN comes up. On a real Sol-20 you would type `XE PACMA` at the SOLOS prompt; the
# `TYPE` line below does that for you (see README.md).
#
# THE NAME IS `PACMA`, not PACMAN: SOLOS file names are five characters. The tape is
# PACMAN.WAV -- a Sol-20 cassette digitized by Philip Lord (hosted on deramp.com), real
# 1200-baud CUTS audio, which the simulator's demodulator reads directly. It loads in a
# second or two: the cassette carries its own clock and the default is full speed, not the
# ~40 s a real recorder took. `SET sol0:tape1 rate=real` buys back the authentic wait.
#
# `base = "sol20"` IS THE MACHINE -- the Sol-PC's three cards (front panel, VDM-1 video at
# 0CC00H, the composite `sol` I/O card at 0F8H-0FEH), 48K of RAM and SOLOS 1.3 in ROM. See
# machines/sol20.toml. This file adds a tape, the launch keystrokes, and the clock.

[machine]
name = "pacman"
base = "sol20"

# PUT THE TAPE IN, TYPE THE COMMAND, BOOT. `startup` runs monitor commands in order:
#   1. MOUNT the cassette in deck 1 -- PLAY is pressed; the deck plays only while SOLOS
#      turns the motor (OUT 0FAH), which it does when you ask it to read.
#   2. TYPE queues `XE PACMA` and a carriage return at the console -- type-ahead SOLOS
#      reads at its first prompt. The backslash DOUBLES in a TOML (`\\r`): the config
#      parser keeps one for the command.
#   3. RUN C000 cold-starts SOLOS, which signs on, reads the queued `XE PACMA`, and loads.
# REW sol0:tape1 rewinds it -- your finger on the recorder if you `XE PACMA` twice.
startup = [
  "MOUNT sol0:tape1 \"PACMAN.WAV\"",
  "TYPE \"XE PACMA\\r\"",
  "RUN C000",
]

# 2.045 MHz -- THE STOCK SOL-20 (14.31818 MHz / 7; Sol Systems Manual, Theory of
# Operation VIII). This is a GAME: it was played at this speed, so it PLAYS authentically.
# The tape has its own clock and loads at full speed regardless. `SET cpu0 clock_hz=0`
# puts it back to flat out.
[[board]]
id       = "cpu0"
clock_hz = 2045000
