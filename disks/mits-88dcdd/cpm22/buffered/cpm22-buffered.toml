# Altair track-buffered CP/M 2.2b v2.3, on an 8" floppy.
#
#     cd disks/mits-88dcdd/cpm22/buffered && altairsim cpm22-buffered.toml
#     -> 56K CP/M 2.2b v2.3
#        For Altair 8" Floppy
#        A>
#
# THE PATHS BELOW ARE RELATIVE TO THIS FILE (core/paths.h, docs/config.md). The disk is
# lying in this directory, so this file names it and no directory at all -- which is what
# lets the folder be copied somewhere and still boot. You get the binary and this tree;
# you do not get the repository. Pointing at it from elsewhere gets the same machine.
#
# THIS FILE IS A DELTA. `base = "default"` brings the machine -- front panel, 8080,
# 88-2SIO console at 0x10, 88-DCDD at 0x08 with four empty drives, 56K of RAM, DBL boot
# PROM at FF00 -- which IS the CP/M Altair. All this file adds is the floppy in drive 0,
# because that is the only thing that makes this machine different from the default one.
# See machines/default.toml for what the base actually contains, or just run `BOARDS`.
#
# THE DISK IMAGE IS NOT IN GIT. `*.dsk` is in .gitignore -- deliberately, they are large
# and not ours to redistribute -- so there is NO UNDO on this file. CP/M writes to A: for
# anything you create, and drive 0 is mounted read/write because that is what a real
# machine is. If you are about to test writes in anger, copy the image first, or add
# `readonly = true` below.
#
# WHAT `readonly = true` ACTUALLY DOES, because it is not what you would guess: it is the
# diskette's write-protect notch, and the notch was sensed by the DRIVE, not the controller. The 88-DCDD
# has no write-protect bit to report -- so the guest is never told. It writes; the head is
# inhibited; the bytes go nowhere. Whether anyone NOTICES is up to the BIOS, and only
# through write-verify: this one has it ON (`mode db 40h` in BIOS.ASM), so a protected disk
# gives you a clean `Delayed Write Error` and CP/M carries on. The 8 MB BIOS has it OFF, and
# there the write appears to SUCCEED and the data evaporates. Both are the real machine.
#
# THE SOURCES ARE SITTING BESIDE THIS FILE -- BOOT.ASM and BIOS.ASM, Mike Douglas's own,
# and the very listings the 88-DCDD was built from (docs/boards/mits-dcdd.md cites them as
# authoritative). Nothing here is a guess.

[machine]
name = "cpm22-buffered"
base = "default"

# THE BOOT PROM IS THE BOOT COMMAND. There is no BOOT verb (DESIGN.md 10.0) -- a machine
# that should start says so with the operator's own keystroke, and on a disk Altair that
# keystroke was EXAMINE FF00 / RUN.
#
# DBL reads sectors 0 and 2 of track 0 into RAM; THAT loader (BOOT.ASM, beside this file)
# pulls the CP/M image into high memory and jumps into the BIOS.
#
# RUN hands the GUEST the keyboard, so you land at CP/M's prompt. ATTN (^E) gets you back
# to the monitor, and the guest cannot take it from you -- which matters, because ^C
# belongs to CP/M (it is warm boot) and CP/M is entitled to read it.
startup = ["RUN FF00"]

# THE DISK. `id` with NO `type` means "the card already in this machine" -- the base's
# 88-DCDD -- so this puts a floppy in an existing drive rather than fitting a second
# controller.
#
# NO `media` KEY, AND THE REASON IS SHARPER HERE THAN ON THE 8 MB DISK. This image is
# 337,664 bytes and an 8" floppy is 77 x 32 x 137 = 337,568 -- it does NOT match. It is
# XMODEM-padded: the file came off a real machine through a protocol that pads to a block
# boundary, and the 96 bytes on the end are the padding. The card knows that (sizeMatches()
# in src/boards/mits-88dcdd.cpp) and probes it as `8in` anyway. A strict compare would
# reject the only 8" disks we have.
[[board]]
id = "dsk0"

  [[board.drive]]
  unit  = 0
  mount = "cpm22b23-56k.dsk"

  # B: IS THE OTHER IMAGE IN THIS DIRECTORY, AND IT IS NOT A SCRATCH DISK. cpm22b23-24k.dsk
  # is a second CP/M system disk -- the same one, relocated for a 24K machine -- and it will
  # not BOOT here (see the arithmetic below). But a data disk is a data disk: it is an
  # ordinary 77-track 8" floppy, and this BIOS reads it happily. DIR B:, PIP from it, run a
  # .COM off it.
  #
  # READ-ONLY, ON PURPOSE, AND IT IS ALSO THE DEMONSTRATION. `readonly` is the diskette's
  # WRITE-PROTECT NOTCH, sensed by the DRIVE, not the controller -- the 88-DCDD has no
  # write-protect bit and cannot tell the guest anything. It writes; the head is inhibited;
  # the bytes go nowhere. What notices is the BIOS, and only through write-verify, which
  # THIS one has on (`mode db 40h`): try it and you get a clean `Delayed Write Error` and a
  # prompt back.
  #
  #     A>ERA B:*.*         -> Delayed Write Error, and B: is untouched
  #
  # If you want somewhere to WRITE, that is what an empty drive is for -- FORMAT one from
  # inside CP/M, or drop your own image in:
  #
  #     MOUNT dsk0:drive2 "my-scratch.dsk"
  [[board.drive]]
  unit     = 1
  mount    = "cpm22b23-24k.dsk"
  readonly = true

# THE 24K MACHINE, which is the other image in this directory and the one place this file
# would need to say something about memory.
#
# 56K is what the base already is, and it is exactly what cpm22b23-56k.dsk was built for
# -- arithmetic straight out of BOOT.ASM:
#
#     MEMSIZE  equ 56              BIOSLEN equ 1900h   (8" floppy; a minidisk is 1000h)
#     CCPBASE  = 56*1024 - 1900 - 0E00 - 0800 = B100
#     BIOSBAS  = B100 + 0800 + 0E00           = C700   ...and C700 + 1900 = E000
#
# The BIOS ends at exactly E000, which is where the default machine's RAM stops. They
# agree, so this file says nothing about memory at all.
#
# cpm22b23-24k.dsk is the same CP/M relocated for a smaller machine: the same sum gives
# BIOSBAS 4700 and an end of 6000. THAT BOOTS HERE PERFECTLY WELL -- the constraint is
# one-way. A machine may have MORE RAM than the image was built for (4700-6000 is good RAM
# in a 56K machine; the 32K above it just goes unused), and only the other direction fails.
# Move it to drive 0 INSTEAD of the 56K image and it comes up saying `24K CP/M 2.2b v2.3`.
#
# To have the AUTHENTIC 24K machine as well, re-fit the memory card:
#
#     [[board]]
#     type = "memory"      # `type` on an id the BASE brought REPLACES the card outright,
#     id   = "mem0"        # which is what you want: regions are a LIST, and adding a
#     fill = "random"      # second one would OVERLAP the base's 56K, not replace it.
#
#       [[board.region]]
#       type = "ram"
#       at   = 0000
#       size = "24K"
#
#       [[board.region]]
#       type  = "rom"      # ...and you must re-state the PROM, because you replaced the
#       at    = FF00       # whole card. Leave it out and there is nothing at FF00 to RUN.
#       mount = "builtin:dbl"
