# Buffered CP/M 2.2b with a WRITE-PROTECTED A:. The fixture for dcdd-readonly.exp.
#
# The paths here are relative to THIS FILE (core/paths.h), which is why the disk is reached
# by ../../.. rather than from wherever ctest happens to be standing.
#
# NOTHING WRITES TO THE IMAGE. That is not a convention this test observes politely -- it is
# the property under test. `readonly = true` is the write-protect tab, and the guest's writes
# must land nowhere. If this test ever dirties cpm22b23-56k.dsk, it has failed in the most
# important way it can, and the shasum in the .exp is there to catch it.

[machine]
name = "dcdd-readonly"
base = "default"

startup = ["RUN FF00"]

[[board]]
id = "dsk0"

  [[board.drive]]
  unit     = 0
  mount    = "../../disks/mits-88dcdd/cpm22/buffered/cpm22b23-56k.dsk"
  readonly = true
