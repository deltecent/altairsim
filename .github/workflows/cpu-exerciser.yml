name: CPU exerciser

# The instruction exercisers (the "slow" label: cpu-8080exm ~2.9B instructions;
# cpu-zexdoc and cpu-zexall ~5.8B each for the Z80) only matter when the CPU/decoder
# changes. So run them path-filtered -- only on commits that touch CPU/ISA code --
# and on demand via workflow_dispatch. They are NOT in the per-push CI matrix. One
# Linux runner is enough: CPU correctness is architecture-independent, and this keeps
# the minutes from multiplying across platforms.
#
# THE PUSH TRIGGER IS RESTRICTED TO master, AND THAT IS NOT COSMETIC. Without the branch
# filter, work on a feature branch fires this TWICE for the same commit -- once for the
# push, once for the pull_request -- and each run is about seven minutes of runner time
# for an answer we already have. ci.yml has carried the same guard since it was written;
# this file was missing it. Coverage is unchanged: a PR is still exercised, a merge to
# master is still exercised, and workflow_dispatch still works. What goes away is only
# the run on a branch push whose PR will test the identical SHA moments later.
# CMakeLists.txt IS NOT A TRIGGER PATH, AND LEAVING IT IN DEFEATED THE FILTER. Sources are
# listed there rather than globbed, so every feature that adds a .cpp edits it -- and the
# exercisers then fired on work that never touched an opcode. Measured: 11 of 182 commits
# have touched src/cpu, src/isa or tests/cpu, yet the WAV cassette and tty-EOF changes each
# spent ~7.5 minutes twice (PR, then the merge to master) proving the 8080 still adds. A
# filter that matches everything is not a filter.
#
# What it was guarding is real but rare: a CMake change that alters how the CPU is compiled
# (an optimization flag, a standard level). That is a workflow_dispatch, not a standing trigger
# -- and a release now exercises all three platforms anyway (cpu-exerciser-release.yml).
on:
  push:
    branches: [ master ]
    paths:
      - 'src/cpu/**'
      - 'src/isa/**'
      - 'tests/cpu/**'
      - 'tests/cputest.cpp'
      - '.github/workflows/cpu-exerciser.yml'
  pull_request:
    paths:
      - 'src/cpu/**'
      - 'src/isa/**'
      - 'tests/cpu/**'
      - 'tests/cputest.cpp'
      - '.github/workflows/cpu-exerciser.yml'
  workflow_dispatch:

jobs:
  exerciser:
    name: CPU exercisers (slow)
    runs-on: ubuntu-latest
    # Share ci.yml's compiler cache. The run's cost is the billions of instructions, not the
    # build, so this is a small win -- but it is the same Linux compiler as ci.yml, so the
    # object files are already warm in the Actions cache and the build is nearly free here.
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      # Full history: see ci.yml. This job builds no artifact, but it does print the
      # banner in its logs, and a run whose version line disagrees with ci.yml's for the
      # same commit is a puzzle nobody should have to solve twice.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --parallel

      # The "slow" label: cpu-8080exm, cpu-zexdoc, cpu-zexall (each a few minutes).
      # acceptance-hostbridge-build is also "slow" but disk-gated and absent without
      # the .DSK, so it does not register here.
      - name: Run slow CPU suite
        run: ctest --test-dir build -L slow --output-on-failure
