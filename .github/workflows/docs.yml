name: Documents

# THE PDFs ARE BUILT HERE, BECAUSE NOBODY REMEMBERS TO BUILD THEM.
#
# docs/altairsim-manual.pdf and docs/altairsim-devguide.pdf are committed, and building
# them needs pandoc and a browser -- which the simulator's build deliberately does NOT
# need (tools/build-docs.sh explains why, and it must stay that way). The result was that
# rebuilding them was a thing a human had to remember, and humans did not: the shipped
# developer guide spent two days telling readers "There is no CI. The tests are real and
# they pass, but nothing runs them automatically" and "Built and tested on exactly one
# platform: macOS on Intel". Both had been false since PRs #1-3. The artifact we ship, and
# the one GitHub renders, contradicted the repository, and nothing anywhere said so.
#
# So: on any push to master that touches the documents, rebuild them and commit the result.
#
# Why this can be trusted to a Linux runner at all: the fonts are EMBEDDED in the document
# now (docs/fonts/README.md). They used to be a wish list -- "Charter", "Georgia",
# "Palatino" -- none of which exists here, so this job would have quietly re-typeset the
# manual in a fallback face. With the faces carried in the document and pandoc pinned to
# the same version used locally, this runner and a Mac produce the same pages.
#
# The one thing NOT pinned is Chrome, which is the paginator. A Chrome update on the runner
# image can therefore reflow the document and produce a real commit here that no human
# wrote. That is noisy but honest, and it is strictly better than the two days of silence
# above.

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'tools/build-docs.sh'
      - '.github/workflows/docs.yml'
  # On a PR we BUILD but do not commit -- it catches a broken document (a bad ORDER entry,
  # an unexpanded {{TOKEN}}, a character our fonts do not have) before it reaches master,
  # where the committing job would just fail instead.
  pull_request:
    paths:
      - 'docs/**'
      - 'tools/build-docs.sh'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Only docs/** is filtered on, and that is enough even though the reference chapters are
# GENERATED from the binary: docs/manual/ref/*.md is committed, and the docs-reference test
# byte-diffs it against what the binary emits. So a src/ change that moves the reference
# either moves docs/ too, or CI is already red. (Precedent: cpu-exerciser.yml.)

permissions:
  contents: write

# Two pushes to master in quick succession must not both try to commit a PDF.
concurrency:
  group: docs-pdf
  cancel-in-progress: false

jobs:
  pdfs:
    name: Rebuild the PDFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # PINNED, and pinned to what the humans have. pandoc's HTML is the paginator's input,
      # so a different pandoc is a different document. Ubuntu's apt pandoc is older than the
      # 3.6 in use locally; matching versions is what lets a person check CI's work by
      # running tools/build-docs.sh and getting the same pages.
      - name: Install pandoc 3.6
        run: |
          curl -fsSL -o /tmp/pandoc.deb \
            https://github.com/jgm/pandoc/releases/download/3.6/pandoc-3.6-1-amd64.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      # poppler-utils gives pdftotext (used below to tell news from noise) and pdffonts
      # (build-docs.sh's check that no font from THIS machine leaked into the PDF). That
      # check is skippable locally and is not skipped here -- this is the machine that
      # matters, because this is the machine that commits.
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # The runner image ships Google Chrome; build-docs.sh finds it by name. Say so out
      # loud, because the alternative failure is a confusing one 20 lines later. (Do not
      # "fix" a missing Chrome with `apt-get install chromium`: on Ubuntu that is a snap
      # shim that does not run headless in CI.)
      - name: Check for the PDF engine
        run: |
          command -v google-chrome || { echo "No google-chrome on the runner image."; exit 1; }
          google-chrome --version

      # WHAT THE PDFs SAID BEFORE. Kept so the step after the build can ask the only
      # question worth asking -- did the CONTENT move? -- rather than "is the file
      # different", which it always is.
      - name: Remember what the PDFs said
        run: |
          mkdir -p /tmp/before
          for pdf in docs/*.pdf; do
            [ -e "$pdf" ] || continue
            pdftotext "$pdf" - > "/tmp/before/$(basename "$pdf").txt" || true
          done

      - name: Rebuild
        run: tools/build-docs.sh

      # NEWS OR NOISE.
      #
      # These PDFs can never be compared as bytes. build-docs.sh stamps every build with a
      # "<date> · <short hash>" subtitle, and Chrome adds its own /CreationDate on top, so
      # two builds of identical Markdown differ every time. Committing on "the file
      # changed" would therefore add ~3 MB to the history on every push to docs/ forever,
      # and the history would say nothing about what changed.
      #
      # So compare the extracted TEXT with the stamp line removed. That is deterministic
      # across builds (verified), and it is the same technique that caught the stale
      # developer guide in the first place. A document whose text did not move is put back
      # the way it was; whatever is left is real, and gets committed.
      - name: Commit the ones that actually changed
        if: github.event_name != 'pull_request'
        run: |
          # The stamp build-docs.sh puts under the title: "2026-07-17 · cfde62c".
          stamp='^[0-9]{4}-[0-9]{2}-[0-9]{2} · [0-9a-f]{7,}$'

          for pdf in docs/*.pdf; do
            base=$(basename "$pdf")
            before="/tmp/before/$base.txt"

            grep -vE "$stamp" "$before" > "/tmp/$base.old" 2>/dev/null || true
            pdftotext "$pdf" - | grep -vE "$stamp" > "/tmp/$base.new" || true

            # A PDF that is new to the repo has no "before" and must always be committed.
            if [ -e "$before" ] && cmp -s "/tmp/$base.old" "/tmp/$base.new"; then
              echo "unchanged: $pdf (this rebuild differs only by its stamp)"
              git checkout -- "$pdf"
            else
              echo "CHANGED:   $pdf"
            fi
          done

          if git diff --quiet -- docs; then
            echo "Nothing to commit -- the documents already said what the Markdown says."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf
          git commit -m "Rebuild the PDFs for ${GITHUB_SHA:0:7}" \
                     -m "Rebuilt by .github/workflows/docs.yml because this push changed the
          documents. Only the PDFs whose extracted text actually moved are here;
          a rebuild that differed solely by its date/hash stamp was discarded."
          git push origin HEAD:master

      # On a PR there is nothing to commit, but there IS something to say: the PDFs on this
      # branch are not the ones that will ship. Master's job rebuilds them after the merge.
      - name: Note for the pull request
        if: github.event_name == 'pull_request'
        run: |
          echo "Documents build cleanly."
          echo "PDFs are not committed from a pull request -- the job on master rebuilds"
          echo "and commits them once this merges. Nothing to do here."
