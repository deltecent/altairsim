name: CI

# Build a native altairsim binary on each platform and run the fast test suite.
# The ~10-min 8080 exerciser (label "slow") is NOT run here -- see cpu-exerciser.yml,
# which runs it only when CPU/ISA code changes.
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # All three legs are required. Windows was advisory (continue-on-error) while
    # src/platform/win32/ was being brought up; it now compiles, links, and passes
    # the full suite on MSVC, so a Windows regression blocks a PR like any other.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: altairsim-linux-x86_64
            binary: build/altairsim
          # One universal (x86_64 + arm64) binary, built on the Apple Silicon runner.
          # macos-14 is plentiful; the Intel macos-13 image is scarce and being
          # deprecated, so we cross-build both slices here instead of running a separate
          # Intel leg. ctest runs the binary natively as arm64; the x86_64 slice is
          # compiled but not exercised on CI (same source, validated on Linux + arm64).
          - name: macos-universal
            os: macos-14
            artifact: altairsim-macos-universal
            binary: build/altairsim
            cmake_args: '-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"'
          - name: windows-x86_64
            os: windows-latest
            artifact: altairsim-windows-x86_64
            binary: build/Release/altairsim.exe

    steps:
      - uses: actions/checkout@v4

      # expect drives the interactive acceptance tests. Ubuntu needs it installed;
      # macOS ships it; Windows gets none -- those tests self-skip at configure time
      # (CMakeLists.txt: if(EXPECT_EXECUTABLE)) and the build/other tests still run.
      - name: Install expect (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect

      # matrix.cmake_args is empty for every leg except macOS (universal-binary flag).
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # Fast suite only. -C Release is required by the Windows multi-config generator
      # and harmless elsewhere. serial-hw self-skips (exit 77); disk-gated tests are
      # not registered without the (non-git) CP/M images.
      - name: Test (fast)
        run: ctest --test-dir build -C Release -LE slow --output-on-failure

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
