name: CI

# Build a native altairsim binary on each platform and run the fast test suite.
# The ~10-min 8080 exerciser (label "slow") is NOT run here -- see cpu-exerciser.yml,
# which runs it only when CPU/ISA code changes.
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Windows is included but advisory: src/platform/win32/ has never been proven
    # (docs/porting-notes.md). continue-on-error keeps a red Windows leg from
    # blocking a PR while the win32 code is brought up. Linux + macOS are required.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: altairsim-linux-x86_64
            binary: build/altairsim
          - name: macos-x86_64
            os: macos-13
            artifact: altairsim-macos-x86_64
            binary: build/altairsim
          - name: macos-arm64
            os: macos-14
            artifact: altairsim-macos-arm64
            binary: build/altairsim
          - name: windows-x86_64
            os: windows-latest
            artifact: altairsim-windows-x86_64
            binary: build/Release/altairsim.exe
            experimental: true

    steps:
      - uses: actions/checkout@v4

      # expect drives the interactive acceptance tests. Ubuntu needs it installed;
      # macOS ships it; Windows gets none -- those tests self-skip at configure time
      # (CMakeLists.txt: if(EXPECT_EXECUTABLE)) and the build/other tests still run.
      - name: Install expect (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      # Fast suite only. -C Release is required by the Windows multi-config generator
      # and harmless elsewhere. serial-hw self-skips (exit 77); disk-gated tests are
      # not registered without the (non-git) CP/M images.
      - name: Test (fast)
        run: ctest --test-dir build -C Release -LE slow --output-on-failure

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
